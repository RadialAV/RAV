<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload • Radial AV</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modals.css">
</head>
<body>
  <div class="app-container" style="max-width:980px;margin:0 auto;padding:1rem;">
    <header class="header" style="position:sticky;top:0;background:var(--bg);z-index:5;padding:0.5rem 0 1rem;">
      <div class="header-top" style="display:flex;align-items:center;gap:0.75rem;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <a class="btn btn-ghost btn-sm" href="index.html">← Voltar</a>
          <h1 style="margin:0;font-size:1.25rem;">Upload</h1>
        </div>
        <div class="header-actions" style="display:flex;gap:0.5rem;align-items:center;">
          <span id="auth-username" style="display:none"></span>
          <button id="auth-signin" class="btn btn-primary btn-sm" type="button">Entrar com Google</button>
          <button id="auth-signout" class="btn btn-ghost btn-sm" type="button" style="display:none;">Sair</button>
        </div>
      </div>
    </header>

    <main class="main-content" style="padding:0;">
      <div id="guard-loading" class="section" style="padding:0.5rem 0 1rem;">A validar acesso…</div>
      <div id="guard-denied" class="section" style="display:none;padding:0.5rem 0 1rem;">Sem acesso. A tua conta não tem permissões para fazer uploads.</div>

      <section id="upload-section" class="section" style="display:none;">
        <h2 class="section-title">Novo Release</h2>
        <form id="upload-form" class="form" autocomplete="off">
          <div class="form-group">
            <label class="form-label">Título do Release</label>
            <input id="release-title" class="form-input" type="text" required>
          </div>
          <div class="form-group">
            <label class="form-label">Artista principal</label>
            <input id="release-artist" class="form-input" type="text" placeholder="Ex: Reu.Ven" required>
          </div>
          <div class="form-row" style="display:flex;gap:0.75rem;flex-wrap:wrap;">
            <div class="form-group" style="flex:1;min-width:160px;">
              <label class="form-label">Ano</label>
              <input id="release-year" class="form-input" type="number" min="1900" max="2100" placeholder="2025">
            </div>
            <div class="form-group" style="flex:1;min-width:160px;">
              <label class="form-label">Preço (release)</label>
              <input id="release-price" class="form-input" type="number" step="0.01" min="0" placeholder="5.00">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Descrição</label>
            <textarea id="release-description" class="form-textarea" rows="3" placeholder="Notas do release"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Capa (imagem)</label>
            <input id="release-cover" class="form-input" type="file" accept="image/*">
          </div>

        <h3 class="section-title" style="margin-top:1.25rem;">Faixas</h3>
        <div id="tracks-container" class="track-list"></div>
        <div style="margin:0.5rem 0 1rem;">
          <button id="add-track-btn" type="button" class="btn btn-secondary btn-sm">+ Adicionar faixa</button>
        </div>

        <div class="form-actions" style="display:flex;gap:0.75rem;align-items:center;">
          <button id="submit-upload" type="submit" class="btn btn-primary">Gravar</button>
          <span id="upload-status" style="color:#888"></span>
        </div>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="js/supabase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/upload_page.js"></script>
</body>
</html>
